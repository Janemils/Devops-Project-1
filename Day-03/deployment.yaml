apiVersion: apps/v1
kind: Deployment
metadata:
  name: janemils-app-deployment
  labels:
    app: janemils-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: janemils-app
  template:
    metadata:
      labels:
        app: janemils-app
    spec:
      # ----- Pull secrets for now as long as repo is private. Can remove this, once it's public. ------- #
      imagePullSecrets:
        - name: secret-repo-deploy
      containers:
      - name: janemils-app
        # ---- Image will be overwritten to the latest from the CI pipeline. ----
        image: ghcr.io/janemils/devops-project-1:834e3282784d66089239791503156b72cfbbfb4e
        ports:
        - containerPort: 8000
        # ---- Readiness probe: ensures traffic is sent only if pod is ready ----
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 3    # wait 3s before first check, allows app startup
          periodSeconds: 5          # check every 5s
          timeoutSeconds: 2         # fail probe if response takes >2s
          failureThreshold: 3       # mark pod unready after 3 consecutive failures
        # ---- Liveness probe: ensures container is alive, restart if fails ----
        livenessProbe:
          httpGet:
            path: /hello
            port: 8000
          initialDelaySeconds: 5    # give app a bit longer to start before checking
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3       # restart container after 3 failures
