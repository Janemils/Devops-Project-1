apiVersion: v1
kind: Service
metadata:
  name: janemils-app-service
  labels:
    app: janemils-app
spec:
  selector:
    app: janemils-app        # matches the Deployment labels
  ports:
    - protocol: TCP
      port: 8000             # service port
      targetPort: 8000       # container port
  type: ClusterIP            # change to NodePort or LoadBalancer if needed

