groups:

# Group name shown in Prometheus
- name: janemils-app-alerts

  rules:

  # --------------------------------------------------
  # ALERT 1 : ApplicationDown
  # --------------------------------------------------
  - alert: ApplicationDown

    # PromQL expression
    #
    # The "up" metric is automatically generated by Prometheus.
    #
    # up = 1 → target reachable
    # up = 0 → target unreachable
    #
    # This alert becomes TRUE when Prometheus
    # cannot scrape the application.
    expr: up{job="janemils-app"} == 0

    # Condition must remain TRUE
    # continuously for 1 minute before firing.
    #
    # Prevents false alarms caused by
    # temporary network issues.
    for: 1m

    labels:

      # Used later by Alertmanager
      # to classify alerts.
      severity: critical

    annotations:

      # Short title shown in notifications.
      summary: "Application Down"

      # Detailed explanation shown in Slack.
      description: "janemils-app is unreachable"


  # --------------------------------------------------
  # ALERT 2 : HighErrorRate
  # --------------------------------------------------
  - alert: HighErrorRate

    # increase(metric[5m])
    #
    # Calculates how much a counter increased
    # during the last 5 minutes.
    #
    # Example:
    #
    # 10 → 25
    #
    # increase = 15
    #
    # Here we're only looking at
    # requests returning HTTP 500.
    #
    # Alert becomes TRUE when
    # more than 5 server errors
    # occur within 5 minutes.
    expr: increase(http_requests_total{status="500"}[5m]) > 5

    # Condition must stay TRUE
    # for 1 minute before firing.
    for: 1m

    labels:

      # Less severe than complete outage.
      severity: warning

    annotations:

      summary: "High Error Rate"

      description: "More than 5 HTTP 500 responses in the last 5 minutes"
